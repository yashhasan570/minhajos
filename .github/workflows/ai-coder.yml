name: Autonomous GitHub AI Coder
on:
  push:
    paths:
      - 'prompt.txt' # যখনই আপনি prompt.txt ফাইলে কিছু লিখে পুশ করবেন, এটি ট্রিপ হবে

jobs:
  build-and-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'

      - name: Trigger Gemini AI Code Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # ১. আপনার দেওয়া প্রম্পট রিড করা
          PROMPT_CONTENT=$(cat prompt.txt)
          
          # ২. কারেন্ট কোডের স্ট্রাকচার অ্যানালাইসিস করা
          CURRENT_CODE=$(cat src/app/page.tsx 2>/dev/null || echo "No existing page code")
          
          # ৩. জেমিনি এআই-কে ব্যাকগ্রাউন্ডে কল করা (Node স্ক্রিপ্টের মাধ্যমে সরাসরি গিটহাবে)
          node -e "
          const fs = require('fs');
          const https = require('https');

          const prompt = \`You are an elite Next.js full-stack architect. Based on this prompt: \${process.env.PROMPT_CONTENT}, rewrite the src/app/page.tsx file. Current file code for context: \${process.env.CURRENT_CODE}. Return ONLY valid TypeScript/Next.js code, no markdown wrappers, no commentary.\`;

          const data = JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] });
          
          const options = {
            hostname: 'generativelanguage.googleapis.com',
            path: '/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + process.env.GEMINI_API_KEY,
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (d) => body += d);
            res.on('end', () => {
              const result = JSON.parse(body);
              const aiCode = result.candidates[0].content.parts[0].text;
              
              // স্বয়ংক্রিয়ভাবে ফোল্ডার ও ফাইল তৈরি করা
              if (!fs.existsSync('src/app')) fs.mkdirSync('src/app', { recursive: true });
              fs.writeFileSync('src/app/page.tsx', aiCode);
              console.log('AI Code written successfully!');
            });
          });
          req.on('error', (e) => console.error(e));
          req.write(data);
          req.end();
          "

      - name: Automatically Commit and Push Changes to Git
        run: |
          git config --global user.name "Minhaj AI Bot"
          git config --global user.email "ai-bot@github.com"
          git add src/app/page.tsx
          git commit -m "🤖 Autonomous AI Code Update [Skip CI]" || echo "No changes to commit"
          git push
