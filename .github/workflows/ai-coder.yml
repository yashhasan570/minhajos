name: Autonomous GitHub AI Coder
on:
  push:
    paths:
      - 'prompt.txt'

jobs:
  build-and-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trigger Gemini AI Code Generation
        env:
          # এখানে সিক্রেটটিকে সরাসরি এনভায়রনমেন্ট ভ্যারিয়েবলে রূপান্তর করা হলো
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT_CONTENT=$(cat prompt.txt)
          CURRENT_CODE=$(cat src/app/page.tsx 2>/dev/null || echo "No existing page code")
          
          export PROMPT_CONTENT
          export CURRENT_CODE

          node -e "
          const fs = require('fs');
          const https = require('https');

          const prompt = \`You are an elite Next.js full-stack architect. Based on this prompt: \${process.env.PROMPT_CONTENT}, rewrite the src/app/page.tsx file. Current file code for context: \${process.env.CURRENT_CODE}. Return ONLY valid, complete Next.js React component code. DO NOT wrap the output in markdown backticks like \\\`\\\`\\\`tsx or \\\`\\\`\\\`. Provide pure raw code only.\`;

          const data = JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] });
          
          const options = {
            hostname: 'generativelanguage.googleapis.com',
            // ২০২৬ সালের স্টেবল মডেল এন্ডপয়েন্ট
            path: '/v1beta/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json'
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (d) => body += d);
            res.on('end', () => {
              try {
                const result = JSON.parse(body);
                if (result.error) {
                  console.error('API Error Response:', result.error.message);
                  process.exit(1);
                }
                
                let aiCode = result.candidates[0].content.parts[0].text;
                
                if (aiCode.includes('\`\`\`')) {
                  aiCode = aiCode.replace(/\`\`\`[a-zA-Z]*\n/g, '').replace(/\`\`\`/g, '');
                }
                
                if (!fs.existsSync('src/app')) fs.mkdirSync('src/app', { recursive: true });
                fs.writeFileSync('src/app/page.tsx', aiCode.trim());
                console.log('AI Code successfully written to src/app/page.tsx!');
              } catch (e) {
                console.error('Crashed while parsing. Response was:', body);
                process.exit(1);
              }
            });
          });
          req.on('error', (e) => console.error(e));
          req.write(data);
          req.end();
          "

      - name: Automatically Commit and Push Changes to Git
        run: |
          git config --global user.name "Minhaj AI Bot"
          git config --global user.email "ai-bot@github.com"
          git add src/app/page.tsx
          git commit -m "🤖 Autonomous AI Code Update [Skip CI]" || echo "No changes to commit"
          git push
